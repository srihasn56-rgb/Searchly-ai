        }

        // ── Fast Google Drive indexing ────────────────────────────────────────
        const DRIVE_PARALLEL = 6; // concurrent downloads

        async function loadGoogleDriveFiles(folderId = null) {
            try {
                document.getElementById("backBtn").classList.add("active");
                document.getElementById("changeFolderBtn").classList.add("active");
                document.getElementById('uploadSection').style.display = 'none';
                document.getElementById('searchSection').classList.add('active');
                document.getElementById('spinner').style.display = 'block';
                document.getElementById('statusText').textContent = 'Loading images from Google Drive...';

                models.embeddings = {};

                // Fetch all file metadata (fast — no image data yet)
                let allFiles = [], pageToken = null;
                do {
                    let url = `${API_URL}/api/drive/files?pageSize=200`;
                    if (pageToken) url += `&pageToken=${pageToken}`;
                    if (folderId)  url += `&folderId=${folderId}`;
                    const resp = await fetch(url);
                    const data = await resp.json();
                    if (data.files) allFiles.push(...data.files);
                    pageToken = data.nextPageToken;
                } while (pageToken);

                console.log(`Found ${allFiles.length} Drive images`);
                totalToProcess = allFiles.length;
                processedCount = 0;
                startTime = Date.now();
                document.getElementById('statusText').textContent = `Processing ${allFiles.length} Drive images...`;

                // Process with controlled parallelism — DRIVE_PARALLEL at a time
                async function processOne(fileInfo) {
                    try {
                        // Use thumbnailLink if available (tiny, fast ~10KB vs 2MB full image)
                        // CLIP still works well on 256px thumbnails
                        let blob;
                        if (fileInfo.thumbnailLink) {
                            const thumbUrl = fileInfo.thumbnailLink.replace('=s220', '=s512');
                            try {
                                const r = await fetch(thumbUrl);
                                if (r.ok) { blob = await r.blob(); }
                            } catch(e) { /* fall through to full download */ }
                        }
                        if (!blob) {
                            const r = await fetch(`${API_URL}/api/drive/download/${fileInfo.id}`);
                            blob = await r.blob();
                        }
                        const file = new File([blob], fileInfo.name, { type: fileInfo.mimeType || 'image/jpeg' });
                        const result = await processImageImproved(file, fileInfo.id);
                        models.embeddings[fileInfo.id] = {
                            ...result.embedding,
                            driveFileId: fileInfo.id,
                            url: `${API_URL}/api/drive/download/${fileInfo.id}`
                        };
                        processedCount = Math.min(processedCount + 1, totalToProcess);
                        const elapsed = (Date.now() - startTime) / 1000;
                        const speed = processedCount / Math.max(elapsed, 0.1);
                        const eta = Math.max((totalToProcess - processedCount) / speed, 0);
                        const pct = Math.min(Math.round((processedCount / totalToProcess) * 100), 100);
                        document.getElementById('imageCount').textContent = `${processedCount}/${totalToProcess} images`;
                        document.getElementById('statusText').textContent =
                            `⚡ ${pct}% | ${speed.toFixed(1)}/s | ETA: ${eta.toFixed(0)}s`;
                    } catch(e) {
                        console.warn(`[Drive] Failed: ${fileInfo.name}`, e.message);
                    }
                }

                // Semaphore: run DRIVE_PARALLEL downloads at once
                indexingCancelled = false;
                let idx = 0;
                async function worker() {
                    while (idx < allFiles.length) {
                        if (indexingCancelled) return;
                        const file = allFiles[idx++];
                        await processOne(file);
                        if (processedCount === 1) {
                            document.getElementById('searchInput').disabled = false;
                            document.getElementById('searchBtn').disabled   = false;
                        }
                    }
                }
                await Promise.all(Array.from({ length: DRIVE_PARALLEL }, worker));

                document.getElementById('spinner').style.display = 'none';
                const totalTime = ((Date.now() - startTime) / 1000).toFixed(1);
                document.getElementById('statusText').textContent =
                    `✅ ${Object.keys(models.embeddings).length} Drive images ready | ${totalTime}s`;
                setTimeout(() => {
                    const badge = document.getElementById('statusBadge');
                    if (badge) {
                        badge.style.transition = 'opacity 0.7s ease';
                        badge.style.opacity    = '0';
                        setTimeout(() => { if (badge) badge.style.display = 'none'; }, 700);
                    }
                }, 3500);

            } catch (error) {
                console.error('Drive error:', error);
                document.getElementById('spinner').style.display = 'none';
                document.getElementById('statusText').textContent = '❌ Drive load failed';
                showError('Drive error: ' + error.message);
            }
        }

        // ==================== REST OF THE CODE (SAME AS BEFORE) ====================
        
        // ── Parallel Worker Pool ────────────────────────────────────────────────
        // Mirrors Python's encode_images_batch(): N workers each with their own
        // ONNX session encode images truly in parallel (like threading on CPU cores).
        let _workerPool    = [];     // active Worker instances
        let _workerReady   = [];     // Promise<void> — resolves when worker finished init
        let _pendingMap    = {};     // id → { resolve, reject }
        let _workerBusy    = [];     // bool per worker
        let _nextJobId     = 0;

        const NUM_WORKERS  = Math.min(navigator.hardwareConcurrency || 4, 8);
        const WORKER_SCRIPT = 'js/indexer-worker.js';

        async function initWorkerPool(modelBuffer) {
            // Spin up workers, each gets its own copy of the model buffer
            _workerPool  = [];
            _workerReady = [];
            _workerBusy  = [];
            _pendingMap  = {};

            for (let w = 0; w < NUM_WORKERS; w++) {
                const worker  = new Worker(WORKER_SCRIPT);
                const workerIdx = w;
                _workerPool.push(worker);
                _workerBusy.push(false);

                worker.onmessage = ({ data }) => {
                    if (data.type === 'result' || data.type === 'encodeError') {
                        _workerBusy[workerIdx] = false;
                        const prom = _pendingMap[data.id];
                        if (prom) {
                            delete _pendingMap[data.id];
                            if (data.type === 'result') prom.resolve(data.vector);
                            else prom.reject(new Error(data.error));
                        }
                    }
                };

                // Send a COPY of the model buffer to each worker (transferable)
                const copy = modelBuffer.slice(0);
                const ready = new Promise((res, rej) => {
                    const origHandler = worker.onmessage;
                    worker.addEventListener('message', function initHandler(e) {
                        if (e.data.type === 'ready') { worker.removeEventListener('message', initHandler); res(); }
                        if (e.data.type === 'error')  { worker.removeEventListener('message', initHandler); rej(new Error(e.data.error)); }
                    });
                });
                worker.postMessage({ type: 'init', modelBuffer: copy }, [copy]);
                _workerReady.push(ready);
            }
            await Promise.all(_workerReady);
            console.log(`[Workers] Pool of ${NUM_WORKERS} workers ready`);
        }

        function terminateWorkerPool() {
            _workerPool.forEach(w => w.terminate());
            _workerPool  = [];
            _workerBusy  = [];
            _pendingMap  = {};
        }

        // Dispatch one image to the next free worker (round-robin)
        function encodeWithWorker(workerIdx, imageBuffer, filename) {
            return new Promise((resolve, reject) => {
                const id = String(_nextJobId++);
                _pendingMap[id] = { resolve, reject };
                _workerBusy[workerIdx] = true;
                _workerPool[workerIdx].postMessage(
                    { type: 'encode', id, imageBuffer, filename },
                    [imageBuffer]   // transfer (zero-copy)
                );
            });
        }

        // processImageImproved kept as FALLBACK for when workers aren't available
        async function processImageImproved(file, fullPath) {
            return new Promise((resolve, reject) => {
                const img = new Image();
                const url = URL.createObjectURL(file);
                img.onload = async () => {
                    try {
                        const canvas = document.createElement('canvas');
                        canvas.width = 224; canvas.height = 224;
                        const ctx = canvas.getContext('2d', { willReadFrequently: true, alpha: false });
                        const scale = 224 / Math.min(img.width, img.height);
                        ctx.drawImage(img, -(img.width * scale - 224) / 2, -(img.height * scale - 224) / 2, img.width * scale, img.height * scale);
                        const { data: pixels } = ctx.getImageData(0, 0, 224, 224);
                        const data = new Float32Array(150528);
                        const mean = [0.48145466, 0.4578275, 0.40821073];
                        const std  = [0.26862954, 0.26130258, 0.27577711];
                        const size = 50176;
                        for (let i = 0; i < size; i++) {
                            const idx = i * 4;
                            data[i]          = (pixels[idx]   / 255 - mean[0]) / std[0];
                            data[i + size]   = (pixels[idx+1] / 255 - mean[1]) / std[1];
                            data[i + size*2] = (pixels[idx+2] / 255 - mean[2]) / std[2];
                        }
                        const result = await models.imgSession.run({ input: new ort.Tensor('float32', data, [1, 3, 224, 224]) });
                        URL.revokeObjectURL(url);
                        resolve({ fullPath, embedding: { vector: normalize(Array.from(result.output.data)), url: URL.createObjectURL(file), filename: file.name } });
                    } catch(e) { URL.revokeObjectURL(url); reject(e); }
                };
                img.onerror = () => { URL.revokeObjectURL(url); reject(new Error('Failed to load image')); };
                img.src = url;
            });
        }

        function expandQuery(query) {
            const variants = [];
            const queryLower = query.toLowerCase().trim();
            
            variants.push(queryLower);
            
            if (queryLower.split(' ').length <= 2) {
                variants.push(`a photo of ${queryLower}`);
                variants.push(`a picture of ${queryLower}`);
            }
            
            variants.push(`${queryLower} in an image`);
            
            return variants;
        }

        async function performSearch() {
            const rawQuery = document.getElementById("searchInput").value.trim();
            if (!rawQuery) { displayResults([]); return; }

            const query = fixTypos(rawQuery);
            document.getElementById("searchBtn").disabled = true;
            document.getElementById("searchBtn").textContent = "Searching...";

            try {
                // ── Python search (fast, same model as indexer) ───────────────
                if (_pyAvailable && _currentFolder) {
                    const r = await fetch(`http://127.0.0.1:${_pyPort}/search`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ query, folder: _currentFolder, top_k: MAX_RES, threshold: MIN_SCORE })
                    });
                    if (r.ok) {
                        const data = await r.json();
                        // Map Python results → display format using blob URLs we already have
                        const results = data.results.map(item => {
                            const emb = models.embeddings[item.path];
                            return { url: emb?.url || null, filename: item.filename, score: item.score };
                        }).filter(r => r.url);
                        displayResults(results);
                        return;
                    }
                }

                // ── JS fallback ───────────────────────────────────────────────
                if (Object.keys(models.embeddings).length === 0) { displayResults([]); return; }

                if (!models.tokenizer) {
                    const TokenizerMod = (await import("https://deno.land/x/clip_bpe@v0.0.6/mod.js")).default;
                    models.tokenizer = new TokenizerMod();
                }
                const queries = expandQuery(query);
                const allScores = [];
                for (const q of queries) {
                    const tokens = Int32Array.from(models.tokenizer.encodeForCLIP(q));
                    const txtRes = await models.txtSession.run({ input: new ort.Tensor("int32", tokens, [1, 77]) });
                    const qVec = normalize(Array.from(txtRes.output.data));
                    const scores = Object.entries(models.embeddings).map(([path, img]) => {
                        let score = 0;
                        for (let i = 0; i < qVec.length; i++) score += qVec[i] * (img.vector?.[i] || 0);
                        return { path, score };
                    });
                    allScores.push(scores);
                }
                const avgScored = Object.values(models.embeddings).map((img, idx) => {
                    let avgScore = 0;
                    allScores.forEach(s => { avgScore += s[idx].score; });
                    avgScore /= allScores.length;
                    return { url: img.url, filename: img.filename, score: avgScore };
                }).sort((a, b) => b.score - a.score);
                const topScore = avgScored.length > 0 ? avgScored[0].score : 0;
                const finalThreshold = Math.max(MIN_SCORE, topScore * REL_THRESHOLD);
                const filtered = avgScored.filter(r => r.score >= finalThreshold);
                showDebugInfo(query, queries, avgScored, finalThreshold, filtered, 0);
                displayResults(filtered.slice(0, MAX_RES));

            } catch (err) {
                console.error("Search error:", err);
                displayResults([]);
            } finally {
                document.getElementById("searchBtn").disabled = false;
                document.getElementById("searchBtn").textContent = "Search";
            }
        }

        function showDebugInfo(query, queries, scored, threshold, filtered, searchTime) {
            const debugPanel = document.getElementById('debugPanel');
            debugPanel.classList.add('active');
            
            const top5 = scored.slice(0, 5).map(s => s.score.toFixed(4)).join(', ');
            const scores = scored.map(s => s.score);
            const mean = (scores.reduce((a, b) => a + b, 0) / scores.length).toFixed(4);
            
            debugPanel.innerHTML = `
                <div style="color: #60a5fa; font-weight: bold; margin-bottom: 0.5rem;">🔍 Search Analysis</div>
                <div class="debug-row"><span>Query:</span><span>"${query}"</span></div>
                <div class="debug-row"><span>Expanded to:</span><span>${queries.length} variants</span></div>
                <div class="debug-row"><span>Total images:</span><span>${scored.length}</span></div>
                <div class="debug-row"><span>Search time:</span><span>${searchTime}ms</span></div>
                <div class="debug-row"><span>Threshold:</span><span>${threshold.toFixed(4)}</span></div>
                <div class="debug-row"><span>Results found:</span><span>${filtered.length}</span></div>
                <div class="debug-row"><span>Score mean:</span><span>${mean}</span></div>
                <div class="debug-row"><span>Top 5 scores:</span><span>${top5}</span></div>
            `;
        }

        function normalize(vec) {
            let norm = 0;
            for (let i = 0; i < vec.length; i++) {
                norm += vec[i] * vec[i];
            }
            norm = Math.sqrt(norm);
            return vec.map(v => v / (norm || 1));
        }

        function displayResults(results) {
            const grid = document.getElementById('resultsGrid');
            grid.innerHTML = '';

            // Hide the bulk-actions bar whenever the grid is refreshed
            const bar = document.getElementById('bulkActionsBar');
            
            if (results.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">
                            <svg width="40" height="40" fill="currentColor" viewBox="0 0 20 20" style="color: #60a5fa;">
                                <path fill-rule="evenodd" d="M8 4a4 4 0 100 8 4 4 0 000-8zM2 8a6 6 0 1110.89 3.476l4.817 4.817a1 1 0 01-1.414 1.414l-4.816-4.816A6 6 0 012 8z" clip-rule="evenodd"/>
                            </svg>
                        </div>
                        <div class="empty-title">No Results Found</div>
                        <div class="empty-desc">
                            No images matched your search with sufficient confidence.<br>
                            Try different search terms.
                        </div>
                    </div>
                `;
                // Hide bulk bar when no results
                if (bar) bar.classList.remove('active');
                return;
            }

            results.forEach(result => {
                const card = document.createElement('div');
                card.className = 'result-card';
                card.innerHTML = `
                    <img src="${result.url}" class="result-img" onclick="openViewer('${result.url}')">
                    <div class="result-overlay">
                        <div class="result-name">${result.filename}</div>
                    </div>
                `;
                grid.appendChild(card);
            });

            // If selection mode is active, re-attach checkboxes to the new cards
            const _selMode = window.selectionMode ||
                             document.getElementById('selectionModeBtn')?.classList.contains('active');
            if (_selMode) {
                if (typeof removeSelectionCheckboxes === 'function') removeSelectionCheckboxes();
                if (typeof addSelectionCheckboxes === 'function') addSelectionCheckboxes();
                if (bar) bar.classList.add('active');
                if (typeof updateSelectionCount === 'function') updateSelectionCount();
            }
        }

        function resetApp() {
            // Cancel any in-progress indexing
            indexingCancelled = true;
            models.embeddings = {};
            processedCount = 0;
            document.getElementById("resultsGrid").innerHTML = "";
            document.getElementById("searchSection").classList.remove("active");
            document.getElementById("uploadSection").style.display = "block";
            document.getElementById("backBtn").classList.remove("active");
            document.getElementById("changeFolderBtn").classList.remove("active");
            document.getElementById("debugPanel").classList.remove('active');
            document.getElementById("imageCount").textContent = "";
            document.getElementById("statusText").textContent = "";
            document.getElementById("spinner").style.display = "none";
        }

        async function selectFolder() {
            try {
                let folderPath = null;
                let fileList   = null;

                if (window.electronAPI?.selectFolder) {
                    const result = await window.electronAPI.selectFolder();
                    if (!result) return;
                    folderPath = result.folderPath;
                    fileList   = result.files;
                } else {
                    if (!window.showDirectoryPicker) {
                        alert("Browser doesn't support folder access. Use Chrome/Edge.");
                        return;
                    }
                    const dirHandle = await window.showDirectoryPicker();
                    folderPath = dirHandle.name;
                    const rawFiles = [];
                    await collectImageFilesBrowser(dirHandle, '', rawFiles);
                    fileList = rawFiles.map(f => ({
                        absolutePath: null,
                        browserEntry: f.entry,
                        browserParent: f.parentHandle,
                        filename: f.filename,
                        fullPath: f.fullPath,
                        size: 0,
                        lastModified: 0
                    }));
                }

                document.getElementById('backBtn').classList.add('active');
                document.getElementById('changeFolderBtn').classList.add('active');
                document.getElementById('uploadSection').style.display = 'none';
                document.getElementById('searchSection').classList.add('active');
                document.getElementById('spinner').style.display = 'block';

                models.embeddings = {};
                _currentFolder = folderPath;

                // ═══════════════════════════════════════════════════════════════
                //  PYTHON FAST PATH — use PyTorch + OpenCLIP backend if available
                // ═══════════════════════════════════════════════════════════════
                if (_pyAvailable && folderPath) {
                    await indexWithPython(folderPath, fileList);
                    return;
                }

                // ═══════════════════════════════════════════════════════════════
                //  JS FALLBACK — ONNX worker pool (if Python not installed)
                // ═══════════════════════════════════════════════════════════════
                const cacheKey = buildFolderCacheKey(folderPath);
                const cached = await loadEmbeddingsFromCache(cacheKey);

                if (cached && cached.data) {
                    const fingerprintMap = {};
                    for (const [path, emb] of Object.entries(cached.data)) {
                        const fp = emb._fingerprint || `${emb.entryFilename || emb.filename}:${emb._size || 0}`;
                        fingerprintMap[fp] = { path, emb };
                    }
                    const cachedItems = [];
                    const newFiles    = [];
                    for (const item of fileList) {
                        const fp = `${item.filename}:${item.size}`;
                        if (fingerprintMap[fp]) cachedItems.push({ item, emb: fingerprintMap[fp].emb });
                        else newFiles.push(item);
                    }

                    document.getElementById('statusText').textContent = `⚡ Loading ${cachedItems.length} images from cache...`;
                    let restoredCount = 0;
                    const RBATCH = 15;
                    for (let i = 0; i < cachedItems.length; i += RBATCH) {
                        const batch = cachedItems.slice(i, i + RBATCH);
                        await Promise.all(batch.map(async ({ item, emb }) => {
                            try {
                                let blobUrl;
                                if (item.absolutePath && window.electronAPI?.readFileAsBase64) {
                                    const r = await window.electronAPI.readFileAsBase64(item.absolutePath);
                                    if (!r.success) return;
                                    const bytes = Uint8Array.from(atob(r.base64), c => c.charCodeAt(0));
                                    blobUrl = URL.createObjectURL(new Blob([bytes], { type: r.mime }));
                                } else if (item.browserEntry) {
                                    blobUrl = URL.createObjectURL(await item.browserEntry.getFile());
                                } else return;
                                const key = item.absolutePath || item.fullPath || item.filename;
                                models.embeddings[key] = { vector: emb.vector, url: blobUrl, filename: emb.entryFilename || emb.filename || item.filename, entryFilename: item.filename, absolutePath: item.absolutePath || emb.absolutePath || null, localPath: item.absolutePath || emb.localPath || null, parentHandle: item.browserParent || null, fileHandle: item.browserEntry || null, _fingerprint: emb._fingerprint || `${item.filename}:${item.size}`, _size: emb._size || item.size || 0 };
                                restoredCount++;
                            } catch(e) { console.warn('[Cache] restore failed', item.filename, e.message); }
                        }));
                        const pct = Math.round((restoredCount / cachedItems.length) * 100);
                        document.getElementById('imageCount').textContent = `${restoredCount}/${cachedItems.length} images`;
                        document.getElementById('statusText').textContent  = `⚡ Loading from cache... ${pct}%`;
                        if (i === 0 && restoredCount > 0) {
                            document.getElementById('searchInput').disabled = false;
                            document.getElementById('searchBtn').disabled   = false;
                        }
                    }
                    if (newFiles.length === 0) {
                        document.getElementById('spinner').style.display = 'none';
                        const savedDate = new Date(cached.savedAt).toLocaleDateString();
                        document.getElementById('statusText').textContent = `⚡ ${restoredCount} images loaded from cache (indexed ${savedDate})`;
                        document.getElementById('imageCount').textContent = `${restoredCount} images`;
                        document.getElementById('searchInput').disabled = false;
                        document.getElementById('searchBtn').disabled   = false;
                        setTimeout(() => { const badge = document.getElementById('statusBadge'); if (badge) { badge.style.transition = 'opacity 0.7s ease'; badge.style.opacity = '0'; setTimeout(() => { if (badge) badge.style.display = 'none'; }, 700); } }, 3500);
                    } else {
                        await scanAndProcessList(newFiles, folderPath, cacheKey, restoredCount);
                    }
                } else {
                    await scanAndProcessList(fileList, folderPath, cacheKey, 0);
                }
            } catch (error) {
                if (error.name !== 'AbortError') {
                    console.error(error);
                    showError('Failed to open folder: ' + error.message);
                    document.getElementById('spinner').style.display = 'none';
                }
            }
        }

        // ── Python indexing — SSE stream progress ─────────────────────────────
        async function indexWithPython(folderPath, fileList) {
            indexingCancelled = false;
            const total = fileList.length;

            document.getElementById('statusText').textContent = `🐍 Python indexer starting... (${total} images)`;
            document.getElementById('imageCount').textContent = `0/${total} images`;

            return new Promise((resolve) => {
                const es = new EventSource(
                    `http://127.0.0.1:${_pyPort}/index?` +
                    new URLSearchParams({ folder: folderPath })
                );
                // POST workaround: EventSource is GET-only, so we use fetch SSE
                es.close();

                // Use fetch with a ReadableStream for POST SSE
                fetch(`http://127.0.0.1:${_pyPort}/index`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ folder: folderPath })
                }).then(async response => {
                    const reader = response.body.getReader();
                    const decoder = new TextDecoder();
                    let buf = '';

                    const t0 = Date.now();

                    while (true) {
                        if (indexingCancelled) {
                            reader.cancel();
                            await fetch(`http://127.0.0.1:${_pyPort}/index/cancel`);
                            break;
                        }

                        const { value, done } = await reader.read();
                        if (done) break;
                        buf += decoder.decode(value, { stream: true });
                        const lines = buf.split('\n');
                        buf = lines.pop();

                        for (const line of lines) {
                            if (!line.startsWith('data: ')) continue;
                            try {
                                const evt = JSON.parse(line.slice(6));
                                if (evt.type === 'init') {
                                    document.getElementById('statusText').textContent =
                                        evt.cached > 0
                                            ? `⚡ ${evt.cached} cached · indexing ${evt.new} new images with Python...`
                                            : `🐍 Indexing ${evt.total} images with Python (PyTorch+OpenCLIP)...`;
                                } else if (evt.type === 'progress') {
                                    const elapsed = Math.max((Date.now() - t0) / 1000, 0.1);
                                    const speed   = evt.done / elapsed;
                                    const eta     = Math.max((evt.total - evt.done) / (speed || 1), 0);
                                    const pct     = Math.round((evt.done / evt.total) * 100);
                                    document.getElementById('imageCount').textContent = `${evt.done}/${evt.total} images`;
                                    document.getElementById('statusText').textContent =
                                        `🐍 ${pct}% | ${speed.toFixed(1)} img/s | ETA: ${eta.toFixed(0)}s`;
                                    if (evt.done >= 1) {
                                        document.getElementById('searchInput').disabled = false;
                                        document.getElementById('searchBtn').disabled   = false;
                                    }
                                } else if (evt.type === 'done') {
                                    document.getElementById('spinner').style.display = 'none';
                                    document.getElementById('imageCount').textContent = `${evt.count} images`;
                                    document.getElementById('statusText').textContent =
                                        `✅ ${evt.count} images indexed in ${evt.time}s (Python)`;
                                    document.getElementById('searchInput').disabled = false;
                                    document.getElementById('searchBtn').disabled   = false;
                                    // Load thumbnails for the index
                                    await loadPythonThumbnails(folderPath, fileList);
                                    setTimeout(() => { const badge = document.getElementById('statusBadge'); if (badge) { badge.style.transition='opacity 0.7s ease'; badge.style.opacity='0'; setTimeout(()=>{ if(badge) badge.style.display='none'; },700); } }, 3500);
                                    resolve();
                                } else if (evt.type === 'error') {
                                    showError('Python indexing failed: ' + evt.message);
                                    document.getElementById('spinner').style.display = 'none';
                                    resolve();
                                }
                            } catch(e) {}
                        }
                    }
                    resolve();
                }).catch(err => {
                    console.error('[PyIndex] Fetch error:', err);
                    showError('Python backend error — falling back to JS indexing');
                    _pyAvailable = false;
                    selectFolder();   // retry with JS
                    resolve();
                });
            });
        }

        // Load thumbnails from Python backend after indexing completes
        async function loadPythonThumbnails(folderPath, fileList) {
            // Build a quick lookup map: filename → item
            const byFilename = {};
            for (const item of fileList) byFilename[item.filename] = item;

            // Generate blob URLs for each file in parallel batches
            const RBATCH = 20;
            for (let i = 0; i < fileList.length; i += RBATCH) {
                const batch = fileList.slice(i, i + RBATCH);
                await Promise.all(batch.map(async item => {
                    try {
                        const key = item.absolutePath || item.filename;
                        if (models.embeddings[key]?.url) return; // already has URL
                        let blobUrl;
                        if (item.absolutePath && window.electronAPI?.readFileAsBase64) {
                            const r = await window.electronAPI.readFileAsBase64(item.absolutePath);
                            if (!r.success) return;
                            const bytes = Uint8Array.from(atob(r.base64), c => c.charCodeAt(0));
                            blobUrl = URL.createObjectURL(new Blob([bytes], { type: r.mime }));
                        }
                        if (blobUrl) {
                            // Store a stub embedding so search results can show images
                            if (!models.embeddings[key]) {
                                models.embeddings[key] = { url: blobUrl, filename: item.filename, absolutePath: item.absolutePath || null, vector: null };
                            } else {
                                models.embeddings[key].url = blobUrl;
                            }
                        }
                    } catch(e) {}
                }));
            }
        }
        // Browser-only fallback collector
        async function collectImageFilesBrowser(handle, path, out) {
            for await (const [name, entry] of handle) {
                const fullPath = path ? `${path}/${name}` : name;
                if (entry.kind === 'directory') {
                    await collectImageFilesBrowser(entry, fullPath, out);
                } else if (/\.(png|jpg|jpeg|webp|gif|bmp)$/i.test(name)) {
                    out.push({ entry, fullPath, parentHandle: handle, filename: name });
                }
            }
        }

        /**
         * Build a stable cache key from the folder path alone.
         * This allows us to look up the same folder's cache even when
         * its file list has changed (new photos added, etc.).
         */
        function buildFolderCacheKey(folderPath) {
            const normalised = (folderPath || '').replace(/\\/g, '/').trim();
            let hash = 0;
            for (let i = 0; i < normalised.length; i++) {
                hash = ((hash << 5) - hash) + normalised.charCodeAt(i);
                hash |= 0;
            }
            const name = normalised.split('/').filter(Boolean).pop() || 'folder';
            return `folder_${name}_${Math.abs(hash)}`;
        }

        // Legacy alias kept for safety (no longer used for new indexing)
        function buildFolderCacheKeyFromList(folderPath, fileList) {
            return buildFolderCacheKey(folderPath);
        }

        // ── New scanAndProcess that works with absolute paths ─────────────────
        /**
         * scanAndProcessList — Parallel worker-pool indexer
         *
         * Works like the Python app's encode_images_batch():
         *   - NUM_WORKERS (= CPU cores, max 8) workers each hold their own ONNX session
         *   - Images are dispatched to whichever worker is free → true parallelism
         *   - File I/O (Electron IPC / browser handle) also runs concurrently
         *   - Blob URLs for display are created on the main thread after encoding
         */
        async function scanAndProcessList(fileList, folderPath, cacheKey = null, alreadyCached = 0) {
            indexingCancelled = false;
            totalToProcess    = fileList.length;
            processedCount    = 0;
            startTime         = Date.now();

            const grandTotal = fileList.length + alreadyCached;

            document.getElementById('statusText').textContent =
                alreadyCached > 0
                    ? `⚡ ${alreadyCached} from cache · Indexing ${fileList.length} new image${fileList.length !== 1 ? 's' : ''}...`
                    : `🚀 Indexing ${fileList.length} images with ${NUM_WORKERS} parallel workers...`;

            // ── Step 1: Boot worker pool with the image model buffer ──────────
            let useWorkers = false;
            try {
                if (typeof Worker !== 'undefined' && typeof OffscreenCanvas !== 'undefined') {
                    // Extract raw buffer from the existing ONNX session (re-load from cache)
                    const imgBuffer = await (async () => {
                        // Try browser cache first (fastest)
                        try {
                            const cache = await caches.open('searchly-models-v1');
                            const resp  = await cache.match('searchly_clip_image_v1');
                            if (resp) return await resp.arrayBuffer();
                        } catch(e) {}
                        // Electron bundled model
                        if (window.electronAPI?.getModelPaths && window.electronAPI?.readModelFile) {
                            const paths = await window.electronAPI.getModelPaths();
                            if (paths?.imageModel) {
                                const r = await window.electronAPI.readModelFile(paths.imageModel);
                                if (r?.success) {
                                    const bytes = Uint8Array.from(atob(r.base64), c => c.charCodeAt(0));
                                    return bytes.buffer;
                                }
                            }
                        }
                        return null;
                    })();

                    if (imgBuffer) {
                        document.getElementById('statusText').textContent = `⚙️ Starting ${NUM_WORKERS} parallel workers...`;
                        await initWorkerPool(imgBuffer);
                        useWorkers = true;
                        console.log(`[Parallel] Using ${NUM_WORKERS}-worker pool`);
                    }
                }
            } catch(e) {
                console.warn('[Parallel] Worker init failed, falling back to single-thread:', e.message);
                terminateWorkerPool();
            }

            // ── Step 2: Process images in parallel ────────────────────────────
            // We keep a "flight" of (NUM_WORKERS * 2) concurrent promises so workers
            // are never starved waiting for file I/O to complete.
            const INFLIGHT = useWorkers ? NUM_WORKERS * 2 : 10;
            let   workerCursor = 0;          // round-robin worker index
            const inFlight = new Set();      // active Promises

            async function processItem(item) {
                if (indexingCancelled) return;
                try {
                    const key = item.absolutePath || item.fullPath || item.filename;
                    let bytes, mime;

                    // ── Read file bytes ──────────────────────────────────────
                    if (item.absolutePath && window.electronAPI?.readFileAsBase64) {
                        const r = await window.electronAPI.readFileAsBase64(item.absolutePath);
                        if (!r.success) throw new Error(r.error);
                        bytes = Uint8Array.from(atob(r.base64), c => c.charCodeAt(0)).buffer;
                        mime  = r.mime || 'image/jpeg';
                    } else {
                        const file = await item.browserEntry.getFile();
                        bytes = await file.arrayBuffer();
                        mime  = file.type || 'image/jpeg';
                    }

                    let vector;

                    if (useWorkers) {
                        // ── Dispatch to next worker (round-robin) ────────────
                        const wIdx = workerCursor % NUM_WORKERS;
                        workerCursor++;
                        vector = await encodeWithWorker(wIdx, bytes, item.filename);
                    } else {
                        // ── Fallback: main-thread ONNX ───────────────────────
                        const file   = new File([bytes], item.filename, { type: mime });
                        const result = await processImageImproved(file, key);
                        vector = result.embedding.vector;
                    }

                    if (indexingCancelled) return;

                    // Blob URL for display — must be created on main thread
                    const blobUrl = URL.createObjectURL(new Blob([bytes], { type: mime }));

                    models.embeddings[key] = {
                        vector,
                        url:           blobUrl,
                        filename:      item.filename,
                        entryFilename: item.filename,
                        absolutePath:  item.absolutePath  || null,
                        localPath:     item.absolutePath  || item.fullPath || null,
                        parentHandle:  item.browserParent || null,
                        fileHandle:    item.browserEntry  || null,
                        _fingerprint:  `${item.filename}:${item.size}`,
                        _size:         item.size || 0,
                    };
                    processedCount++;

                    // Update progress UI
                    const elapsed  = Math.max((Date.now() - startTime) / 1000, 0.1);
                    const speed    = processedCount / elapsed;
                    const eta      = Math.max((totalToProcess - processedCount) / speed, 0);
                    const progress = Math.min(Math.round((processedCount / totalToProcess) * 100), 100);
                    const done     = alreadyCached + processedCount;

                    document.getElementById('imageCount').textContent =
                        alreadyCached > 0
                            ? `${done}/${grandTotal} images (${processedCount}/${totalToProcess} new)`
                            : `${processedCount}/${totalToProcess} images`;
                    document.getElementById('statusText').textContent =
                        `⚡ ${progress}% | ${speed.toFixed(1)} img/s | ETA: ${eta.toFixed(0)}s`;

                    // Enable search after first image is done
                    if (processedCount === 1) {
                        document.getElementById('searchInput').disabled = false;
                        document.getElementById('searchBtn').disabled   = false;
                    }
                } catch(err) {
                    console.warn('[Index] Failed:', item.filename, err.message);
                }
            }

            // Sliding window of in-flight promises
            for (const item of fileList) {
                if (indexingCancelled) break;

                const p = processItem(item).then(() => inFlight.delete(p));
                inFlight.add(p);

                // Throttle: wait until a slot frees up before dispatching more
                if (inFlight.size >= INFLIGHT) {
                    await Promise.race(inFlight);
                }
            }
            // Drain remaining
            await Promise.all(inFlight);

            // Shut down workers
            if (useWorkers) terminateWorkerPool();

            if (indexingCancelled) {
                console.log('[Index] Cancelled by user');
                return;
            }

            document.getElementById('spinner').style.display = 'none';
            const totalTime  = ((Date.now() - startTime) / 1000).toFixed(1);
            const finalCount = Object.keys(models.embeddings).length;
            document.getElementById('statusText').textContent =
                alreadyCached > 0
                    ? `✅ ${finalCount} images ready · ${processedCount} new in ${totalTime}s`
                    : `✅ ${finalCount} images indexed in ${totalTime}s`;

            // Persist cache
            if (cacheKey && !indexingCancelled && processedCount > 0) {
                saveEmbeddingsToCache(cacheKey).then(() =>
                    console.log('[Cache] Saved', finalCount, 'embeddings'));
            }

            setTimeout(() => {
                const badge = document.getElementById('statusBadge');
                if (badge) {
                    badge.style.transition = 'opacity 0.7s ease';
                    badge.style.opacity    = '0';
                    setTimeout(() => { if (badge) badge.style.display = 'none'; }, 700);
                }
            }, 3500);
        }

        // ── restoreFromCache: re-read blobs from disk, restore absolute paths ─
        async function restoreFromCache(cached, fileList, folderPath) {
            try {
                // Build map: filename → item (for matching cached entries to live files)
                const byPath = {};
                for (const item of fileList) {
                    const key = item.absolutePath || item.fullPath || item.filename;
                    byPath[key] = item;
                    // Also index by just filename as fallback
                    byPath[item.filename] = item;
                }

                const entries = Object.entries(cached.data);
                const total   = entries.length;
                let restored  = 0;

                // Restore in parallel batches of 20 for speed
                const RBATCH = 20;
                for (let i = 0; i < entries.length; i += RBATCH) {
                    const batch = entries.slice(i, i + RBATCH);
                    await Promise.all(batch.map(async ([key, emb]) => {
                        const item = byPath[key] || byPath[emb.entryFilename] || byPath[emb.filename] || null;
                        if (!item) return;

                        let blobUrl;
                        try {
                            if (item.absolutePath && window.electronAPI?.readFileAsBase64) {
                                const r = await window.electronAPI.readFileAsBase64(item.absolutePath);
                                if (!r.success) return;
                                const bytes = Uint8Array.from(atob(r.base64), c => c.charCodeAt(0));
                                blobUrl = URL.createObjectURL(new Blob([bytes], { type: r.mime }));
                            } else if (item.browserEntry) {
                                blobUrl = URL.createObjectURL(await item.browserEntry.getFile());
                            } else return;
                        } catch(e) { return; }

                        models.embeddings[key] = {
                            vector:        emb.vector,
                            filename:      emb.filename,
                            url:           blobUrl,
                            absolutePath:  item.absolutePath || null,
                            localPath:     item.absolutePath || item.fullPath || null,
                            entryFilename: item.filename,
                            parentHandle:  item.browserParent || null,
                            fileHandle:    item.browserEntry  || null,
                        };
                        restored++;
                    }));

                    // Update progress while restoring
                    document.getElementById('imageCount').textContent = `${restored}/${total} images`;
                    document.getElementById('statusText').textContent = `⚡ Loading from cache... ${Math.round(restored/total*100)}%`;
                    // Enable search as soon as first batch is ready
                    if (i === 0 && restored > 0) {
                        document.getElementById('searchInput').disabled = false;
                        document.getElementById('searchBtn').disabled   = false;
                    }
                }

                document.getElementById('imageCount').textContent = `${restored}/${restored} images`;
                document.getElementById('spinner').style.display  = 'none';
                const savedDate = new Date(cached.savedAt).toLocaleDateString();
                document.getElementById('statusText').textContent =
                    `⚡ ${restored} images loaded from cache (indexed ${savedDate})`;
                document.getElementById('searchInput').disabled = false;
                document.getElementById('searchBtn').disabled   = false;

                setTimeout(() => {
                    const badge = document.getElementById('statusBadge');
                    if (badge) {
                        badge.style.transition = 'opacity 0.7s ease';
                        badge.style.opacity    = '0';
                        setTimeout(() => { if (badge) badge.style.display = 'none'; }, 700);
                    }
                }, 3500);

                console.log('[Cache] Restored', restored, 'embeddings');
            } catch(e) {
                console.error('[Cache] Restore failed:', e);
                await scanAndProcessList(fileList, folderPath, null);
            }
        }

        // buildFolderCacheKey replaced by buildFolderCacheKeyFromList above

        // ── IndexedDB helpers ─────────────────────────────────────────────────
        function openEmbeddingDB() {
            return new Promise((resolve, reject) => {
                const req = indexedDB.open('searchly_embeddings', 1);
                req.onupgradeneeded = e => {
                    e.target.result.createObjectStore('folders');
                };
                req.onsuccess = e => resolve(e.target.result);
                req.onerror   = e => reject(e.target.error);
            });
        }

        async function loadEmbeddingsFromCache(cacheKey) {
            try {
                const db = await openEmbeddingDB();
                return await new Promise((resolve, reject) => {
                    const tx  = db.transaction('folders', 'readonly');
                    const req = tx.objectStore('folders').get(cacheKey);
                    req.onsuccess = e => resolve(e.target.result || null);
                    req.onerror   = e => reject(e.target.error);
                });
            } catch (e) {
                console.warn('[Cache] Load failed:', e);
                return null;
            }
        }

        async function saveEmbeddingsToCache(cacheKey) {
            try {
                // Serialize only the vector + metadata (not file handles — those can't be stored)
                const serializable = {};
                for (const [path, emb] of Object.entries(models.embeddings)) {
                    const fname = emb.entryFilename || emb.filename || path.split(/[\/]/).pop();
                    serializable[path] = {
                        vector:        emb.vector,
                        filename:      emb.filename      || fname,
                        entryFilename: emb.entryFilename || fname,
                        absolutePath:  emb.absolutePath  || emb.localPath || path,
                        localPath:     emb.absolutePath  || emb.localPath || path,
                        // ── incremental cache fields ──
                        _fingerprint:  emb._fingerprint  || `${fname}:${emb._size || 0}`,
                        _size:         emb._size         || 0,
                    };
                }
                const db = await openEmbeddingDB();
                await new Promise((resolve, reject) => {
                    const tx  = db.transaction('folders', 'readwrite');
                    const req = tx.objectStore('folders').put({
                        data:      serializable,
                        savedAt:   Date.now(),
                        count:     Object.keys(serializable).length
                    }, cacheKey);
                    req.onsuccess = () => resolve();
                    req.onerror   = e => reject(e.target.error);
                });
                console.log(`[Cache] Saved ${Object.keys(serializable).length} embeddings for key: ${cacheKey}`);
            } catch (e) {
                console.warn('[Cache] Save failed:', e);
            }
        }

        // ── Restore from cache: vectors from DB + live handles from fresh pick ─
        // ── Model constants (fallback URLs if not bundled) ────────────────────
        const MODEL_IMG_URL = 'https://huggingface.co/rocca/openai-clip-js/resolve/main/clip-image-vit-32-float32.onnx';
        const MODEL_TXT_URL = 'https://huggingface.co/rocca/openai-clip-js/resolve/main/clip-text-vit-32-float32-int32.onnx';
        const MODEL_IMG_KEY = 'searchly_clip_image_v1';
        const MODEL_TXT_KEY = 'searchly_clip_text_v1';

        /**
         * Load a model — priority order:
         *  1. Bundled on disk (Electron packaged) — instant, no download
         *  2. Bundled in dev build/models/ (Electron dev) — instant
         *  3. Browser Cache API — cached from previous download
         *  4. Download from HuggingFace — first-time browser / fallback
         */
        async function loadModel(diskPath, url, cacheKey, label) {
            const status = document.getElementById('statusText');

            // ── 1 & 2: Electron — read from bundled disk file ──────────────
            if (window.electronAPI?.readModelFile && diskPath) {
                try {
                    status.textContent = `📦 Loading ${label} from disk...`;
                    const r = await window.electronAPI.readModelFile(diskPath);
                    if (r.success) {
                        status.textContent = `✅ ${label} ready`;
                        // Decode base64 → ArrayBuffer
                        const binary = atob(r.base64);
                        const buffer = new ArrayBuffer(binary.length);
                        const view   = new Uint8Array(buffer);
                        for (let i = 0; i < binary.length; i++) view[i] = binary.charCodeAt(i);
                        console.log(`[Model] Loaded ${label} from disk (${(r.byteLength/1024/1024).toFixed(1)} MB)`);
                        return buffer;
                    }
                    // Disk file missing (dev without download-models) — fall through
                    console.warn(`[Model] ${label} not on disk (${diskPath}), falling back to download`);
                } catch(e) {
                    console.warn(`[Model] Disk load failed for ${label}:`, e.message);
                }
            }

            // ── 3: Browser Cache API ────────────────────────────────────────
            let cache = null;
            try { cache = await caches.open('searchly-models-v1'); } catch(e) {}
            if (cache) {
                const cached = await cache.match(cacheKey);
                if (cached) {
                    status.textContent = `✅ ${label} loaded from cache`;
                    return await cached.arrayBuffer();
                }
            }

            // ── 4: Download from HuggingFace ────────────────────────────────
            status.textContent = `⬇️ Downloading ${label} (one-time only)...`;
            const resp = await fetch(url);
            if (!resp.ok) throw new Error(`Download failed: HTTP ${resp.status}`);

            const total  = parseInt(resp.headers.get('Content-Length') || '0');
            const reader = resp.body.getReader();
            const chunks = [];
            let received = 0;

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                chunks.push(value);
                received += value.length;
                const pct  = total > 0 ? Math.round(received / total * 100) : '?';
                const mb   = (received / 1024 / 1024).toFixed(1);
                status.textContent = `⬇️ Downloading ${label}... ${pct}% (${mb} MB)`;
            }

            const buf = new Uint8Array(chunks.reduce((s, c) => s + c.length, 0));
            let offset = 0;
            for (const chunk of chunks) { buf.set(chunk, offset); offset += chunk.length; }

            if (cache) {
                try { await cache.put(cacheKey, new Response(buf.buffer.slice(0), { headers: { 'Content-Type': 'application/octet-stream' } })); }
                catch(e) { console.warn('[Cache] Could not save model:', e); }
            }
            return buf.buffer;
        }

        async function fetchModelCached(url, cacheKey, label) {
            const cacheName = "searchly-models-v1";
            let cache;
            try { cache = await caches.open(cacheName); } catch(e) { cache = null; }

            if (cache) {
                const cached = await cache.match(cacheKey);
                if (cached) {
                    document.getElementById('statusText').textContent = `✅ ${label} loaded from cache`;
                    const buf = await cached.arrayBuffer();
                    return buf;
                }
            }

            // Not cached — download with progress
            document.getElementById('statusText').textContent = `⬇️ Downloading ${label} (first time only)...`;
            const resp = await fetch(url);
            if (!resp.ok) throw new Error(`Failed to download ${label}: ${resp.status}`);

            // Stream with progress indicator
            const contentLength = resp.headers.get('Content-Length');
            const total = contentLength ? parseInt(contentLength) : 0;
            const reader = resp.body.getReader();
            const chunks = [];
            let received = 0;

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                chunks.push(value);
                received += value.length;
                if (total > 0) {
                    const pct = Math.round((received / total) * 100);
                    document.getElementById('statusText').textContent =
                        `⬇️ Downloading ${label}... ${pct}% (${(received/1024/1024).toFixed(1)} MB)`;
                } else {
                    document.getElementById('statusText').textContent =
                        `⬇️ Downloading ${label}... ${(received/1024/1024).toFixed(1)} MB`;
                }
            }

            // Assemble buffer
            const totalBytes = chunks.reduce((s, c) => s + c.length, 0);
            const buffer = new Uint8Array(totalBytes);
            let offset = 0;
            for (const chunk of chunks) { buffer.set(chunk, offset); offset += chunk.length; }
            const arrayBuffer = buffer.buffer;

            // Store in cache for next time
            if (cache) {
                try {
                    await cache.put(cacheKey, new Response(arrayBuffer.slice(0), {
                        headers: { 'Content-Type': 'application/octet-stream' }
                    }));
                    console.log(`[Cache] Saved ${label} to cache`);
                } catch(e) {
                    console.warn('[Cache] Could not save model:', e);
                }
            }

            return arrayBuffer;
        }

        async function initModels() {
            try {
                document.getElementById('spinner').style.display = 'block';
                document.getElementById('statusText').textContent = 'Loading AI models...';

                // Main-thread ONNX config (used by text model for search)
                ort.env.wasm.numThreads = Math.max(2, Math.floor((navigator.hardwareConcurrency || 4) / 2));
                ort.env.wasm.simd = true;
                ort.env.wasm.proxy = false;  // workers handle image parallelism

                // Get bundled disk paths (Electron only — null in browser)
                let imgDiskPath = null, txtDiskPath = null;
                if (window.electronAPI?.getModelPaths) {
                    try {
                        const paths = await window.electronAPI.getModelPaths();
                        imgDiskPath = paths.imageModel;
                        txtDiskPath = paths.textModel;
                        console.log('[Model] Bundled paths:', paths);
                    } catch(e) { console.warn('[Model] Could not get bundled paths:', e.message); }
                }

                // Load both models (disk → cache → download)
                const imgBuffer = await loadModel(imgDiskPath, MODEL_IMG_URL, MODEL_IMG_KEY, 'Image Model');
                document.getElementById('statusText').textContent = 'Initializing image model...';
                const imgSession = await ort.InferenceSession.create(imgBuffer);

                const txtBuffer = await loadModel(txtDiskPath, MODEL_TXT_URL, MODEL_TXT_KEY, 'Text Model');
                document.getElementById('statusText').textContent = 'Initializing text model...';
                const txtSession = await ort.InferenceSession.create(txtBuffer);

                models.imgSession = imgSession;
                models.txtSession = txtSession;

                document.getElementById('spinner').style.display = 'none';
                document.getElementById('statusText').textContent = '🚀 Ready — select a folder to begin';
            } catch (error) {
                console.error('[Model] Init failed:', error);
                document.getElementById('statusText').textContent = '❌ Model loading failed: ' + error.message;
                document.getElementById('spinner').style.display = 'none';
            }
        }

        let currentImageSrc = "";
        let currentImagePath = ""; // absolute path for Electron share/open
        let currentScale = 1;
        
        function openViewer(src) {
            // Block viewer when selection mode is active — clicks should select, not open
            if (window.selectionMode) return;
            currentImageSrc = src;
            currentScale = 1;
            // Find absolute path from embeddings
            const key = Object.keys(models.embeddings || {}).find(k => models.embeddings[k].url === src);
            currentImagePath = (key && models.embeddings[key].absolutePath) ? models.embeddings[key].absolutePath : '';
            const img = document.getElementById("viewerImg");
            img.src = src;
            img.style.transform = "scale(1)";
            document.getElementById("imageViewer").style.display = "block";
        }
        
        function closeViewer() {
            currentScale = 1;
            document.getElementById("imageViewer").style.display = "none";
        }
        
        function zoomIn() {
            currentScale += 0.2;
            if (currentScale > 3) currentScale = 3;
            document.getElementById("viewerImg").style.transform = `scale(${currentScale})`;
        }
        
        function zoomOut() {
            currentScale -= 0.2;
            if (currentScale < 0.5) currentScale = 0.5;
            document.getElementById("viewerImg").style.transform = `scale(${currentScale})`;
        }
        
        function downloadImage() {
            const a = document.createElement("a");
            a.href = currentImageSrc;
            a.download = "searchly_image_" + Date.now() + ".jpg";
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        }
        
        async function shareImage() {
            // In Electron on Windows, navigator.share doesn't exist.
            // Best UX: copy the file path to clipboard + show the file in Explorer
            if (window.electronAPI) {
                try {
                    if (currentImagePath) {
                        // Copy absolute path to clipboard
                        await navigator.clipboard.writeText(currentImagePath);
                        // Open file location in Explorer so user can share from there
                        await window.electronAPI.showItemInFolder(currentImagePath);
                        if (typeof showSuccess === 'function')
                            showSuccess('📋 File path copied & location opened — share from Explorer!');
                    } else {
                        // Fallback: copy blob URL (Drive images)
                        await navigator.clipboard.writeText(currentImageSrc);
                        if (typeof showSuccess === 'function')
                            showSuccess('📋 Image URL copied to clipboard!');
                    }
                } catch (err) {
                    console.error('Share error:', err);
                    if (typeof showError === 'function')
                        showError('Could not copy to clipboard. Try downloading instead.');
                }
                return;
            }

            // Browser fallback — use Web Share API if available
            if (navigator.share) {
                try {
                    const response = await fetch(currentImageSrc);
                    const blob = await response.blob();
                    const file = new File([blob], 'searchly_image.jpg', { type: blob.type });
                    await navigator.share({ files: [file], title: 'Photo from Searchly AI' });
                } catch (error) {
                    if (error.name !== 'AbortError') {
                        console.error('Share failed:', error);
                        if (typeof showError === 'function') showError('Share failed. Try downloading instead.');
                    }
                }
            } else {
                // Last resort: copy URL
                try {
                    await navigator.clipboard.writeText(currentImageSrc);
                    if (typeof showSuccess === 'function') showSuccess('📋 Image URL copied to clipboard!');
                } catch(e) {
                    alert('Sharing not supported on this device.');
                }
            }
        }

        window.addEventListener('load', async () => {
            // Start Python backend check and JS model load in parallel
            // Python path: PyTorch+OpenCLIP (fast)
            // JS path: ONNX models (fallback if Python not installed)
            await Promise.all([
                initPythonBackend(),
                initModels(),
            ]);
        });
    </script>
