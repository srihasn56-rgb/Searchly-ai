<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Photo Searchly AI</title>
    <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.12.0/dist/ort.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #000000; color: #fff; min-height: 100vh;
        }
        
        .header {
            border-bottom: 1px solid #1f2937;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(20px);
            position: sticky; top: 0; z-index: 50;
        }
        .header-content {
            max-width: 1280px;
            margin: 0 auto;
            padding: 1rem 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .header-left {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        
        .back-btn {
            display: none;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 1px solid #374151;
            background: linear-gradient(135deg, rgba(31, 41, 55, 0.8), rgba(17, 24, 39, 0.8));
            color: #e5e7eb;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .back-btn.active { display: flex; }
        .back-btn:hover { border-color: #60a5fa; box-shadow: 0 0 20px rgba(96, 165, 250, 0.3); }
        
        .logo {
            display: flex; 
            align-items: center; 
            gap: 0.75rem;
        }
        
        .logo-icon {
            width: 40px; 
            height: 40px; 
            border-radius: 10px;
            background: linear-gradient(135deg, #3b82f6, #a855f7);
            display: flex; 
            align-items: center; 
            justify-content: center;
            box-shadow: 0 4px 20px rgba(59, 130, 246, 0.3);
        }
        
        .logo-text { 
            font-size: 1.25rem; 
            font-weight: 600;
        }
        
        .header-stat { 
            font-size: 0.875rem; 
            color: #9ca3af; 
        }
        
        main { max-width: 1280px; margin: 0 auto; padding: 3rem 1.5rem; }
        
        .status-bar {
            text-align: center; margin-bottom: 2rem;
        }
        .status-badge {
            display: inline-flex; align-items: center; gap: 0.5rem;
            padding: 0.5rem 1rem; border-radius: 9999px;
            background: #231d47; border: 1px solid #1f2937;
            font-size: 0.875rem; color: #d1d5db;
        }
        .spinner {
            width: 16px; height: 16px; border: 2px solid #374151;
            border-top-color: #3b82f6; border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .debug-panel {
            max-width: 700px;
            margin: 1rem auto;
            padding: 1rem;
            background: #1f2937;
            border-radius: 0.75rem;
            font-size: 0.75rem;
            color: #9ca3af;
            font-family: 'Courier New', monospace;
            display: none;
        }
        .debug-panel.active { display: none !important; }
        .debug-row {
            display: flex;
            justify-content: space-between;
            padding: 0.25rem 0;
            border-bottom: 1px solid #374151;
        }
        
        .upload-section { max-width: 672px; margin: 0 auto; }
        .hero { text-align: center; margin-bottom: 3rem; }
        .hero-title {
            font-size: 2.5rem; 
            font-weight: 700; 
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #60a5fa, #a78bfa, #ec4899);
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent;
        }
        .hero-subtitle { 
            font-size: 1.125rem; 
            color: #9ca3af;
        }
        
        .button-grid { display: grid; gap: 1rem; }
        .upload-btn {
            background: linear-gradient(135deg, #1f2937, #111827);
            border: 1px solid #374151; border-radius: 1rem;
            padding: 2rem; cursor: pointer; transition: all 0.3s;
            display: flex; align-items: center; gap: 1rem;
        }
        .upload-btn:hover { border-color: #4b5563; }
        .upload-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-icon {
            width: 56px; height: 56px; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
        }
        .btn-icon.blue { background: rgba(59, 130, 246, 0.15); }
        .btn-icon.purple { background: rgba(168, 85, 247, 0.15); }
        .btn-info { text-align: left; flex: 1; }
        .btn-title { font-size: 1.125rem; font-weight: 600; }
        .btn-desc { font-size: 0.875rem; color: #9ca3af; }
        
        .search-section { display: none; }
        .search-section.active { display: block; }
        .search-container { max-width: 768px; margin: 0 auto; }
        .search-box {
            position: relative; 
            width: 100%;
            display: flex;
            gap: 0.75rem;
        }
        
        .search-input-wrapper {
            position: relative;
            flex: 1;
        }
        
        .search-icon {
            position: absolute; left: 1.5rem; top: 50%;
            transform: translateY(-50%); color: #9ca3af;
            width: 20px; height: 20px;
        }
        .search-input {
            width: 100%; 
            padding: 1.25rem 5rem 1.25rem 3.5rem;
            border-radius: 1rem; 
            background: #111827;
            border: 1px solid #1f2937; 
            color: #fff;
            font-size: 1.125rem; 
            outline: none; 
            transition: all 0.3s;
        }
        .search-input:focus { 
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }
        
        .search-btn {
            position: absolute; 
            right: 0.5rem; 
            top: 50%;
            transform: translateY(-50%);
            padding: 0.75rem 1.5rem; 
            border-radius: 0.75rem;
            background: linear-gradient(135deg, #3b82f6, #a855f7);
            border: none; 
            color: #fff; 
            font-weight: 600;
            cursor: pointer; 
            transition: all 0.3s;
        }
        .search-btn:hover { opacity: 0.9; }
        
        .change-folder-btn {
            display: none;
            align-items: center;
            gap: 0.5rem;
            padding: 1.25rem 1.5rem;
            border-radius: 1rem;
            background: linear-gradient(135deg, #1f2937, #111827);
            border: 1px solid #374151; 
            color: #e5e7eb; 
            font-weight: 600;
            cursor: pointer; 
            transition: all 0.3s;
            white-space: nowrap;
        }
        .change-folder-btn.active { display: flex; }
        .change-folder-btn:hover {
            background: linear-gradient(135deg, #374151, #1f2937);
            border-color: #60a5fa;
        }
        
        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 1rem; margin-top: 2rem;
        }
        .result-card {
            position: relative; aspect-ratio: 1;
            border-radius: 1rem; overflow: hidden;
            background: #111827; border: 1px solid #1f2937;
            cursor: pointer; transition: all 0.3s;
        }
        .result-card:hover { 
            border-color: #374151;
            transform: translateY(-4px);
        }
        .result-img {
            width: 100%; height: 100%; object-fit: cover;
        }
        .result-overlay {
            position: absolute; inset: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
            opacity: 0; transition: opacity 0.3s;
            pointer-events: none;
        }
        .result-card:hover .result-overlay { opacity: 1; }
        .result-name {
            position: absolute; bottom: 0.5rem; left: 0.5rem; right: 0.5rem;
            font-size: 0.75rem; color: rgba(255,255,255,0.9); 
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .result-score {
            position: absolute; top: 0.5rem; right: 0.5rem;
            background: rgba(0, 0, 0, 0.9);
            padding: 0.25rem 0.6rem;
            border-radius: 0.5rem;
            font-size: 0.7rem;
            font-weight: 700;
            color: #60a5fa;
            pointer-events: none;
        }
        
        .empty-state {
            grid-column: 1/-1;
            text-align: center;
            padding: 5rem 2rem;
        }
        .empty-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 1.5rem;
            border-radius: 50%;
            background: #1f2937;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .empty-title {
            font-size: 1.5rem;
            font-weight: 600;
            color: #e5e7eb;
            margin-bottom: 0.5rem;
        }
        .empty-desc {
            font-size: 1rem;
            color: #9ca3af;
            line-height: 1.6;
        }
        
        #imageViewer {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.95);
            z-index: 9999;
            backdrop-filter: blur(10px);
        }
        .viewer-toolbar {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            padding: 12px;
        }
        .viewer-toolbar button {
            background: #111827;
            border: 1px solid #374151;
            color: #fff;
            padding: 10px 18px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .viewer-toolbar button:hover {
            background: #1f2937;
            border-color: #60a5fa;
            transform: translateY(-2px);
        }
        #viewerImg {
            max-width: 90%;
            max-height: 90%;
            transition: transform 0.2s ease;
            cursor: grab;
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-content">
            <div class="header-left">
                <button id="backBtn" class="back-btn" onclick="resetApp()">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7"/>
                    </svg>
                </button>
                
                <div class="logo">
                    <div class="logo-icon">
                        <svg width="20" height="20" fill="currentColor" viewBox="0 0 20 20">
                            <path fill-rule="evenodd" d="M4 3a2 2 0 00-2 2v10a2 2 0 002 2h12a2 2 0 002-2V5a2 2 0 00-2-2H4zm12 12H4l4-8 3 6 2-4 3 6z" clip-rule="evenodd"/>
                        </svg>
                    </div>
                    <span class="logo-text">Searchly AI</span>
                </div>
            </div>

            <div class="header-stat" id="imageCount"></div>
        </div>
    </header>

    <main>
        <div class="status-bar">
            <div class="status-badge" id="statusBadge">
                <div class="spinner" id="spinner" style="display:none"></div>
                <span id="statusText">Initializing AI models...</span>
            </div>
        </div>

        <div class="debug-panel" id="debugPanel"></div>

        <div class="upload-section" id="uploadSection">
            <div class="hero">
                <h1 class="hero-title">Your Memories, Just One Search Away</h1>
                <p class="hero-subtitle"></p>
            </div>
            <div class="button-grid">
                <button class="upload-btn" onclick="selectFolder()">
                    <div class="btn-icon blue">
                        <svg width="28" height="28" fill="currentColor" viewBox="0 0 20 20">
                            <path d="M2 6a2 2 0 012-2h5l2 2h5a2 2 0 012 2v6a2 2 0 01-2 2H4a2 2 0 01-2-2V6z"/>
                        </svg>
                    </div>
                    <div class="btn-info">
                        <div class="btn-title">Select Local Folder</div>
                        <div class="btn-desc">Browse and index photos from your device</div>
                    </div>
                </button>
                
                <button class="upload-btn" id="googleDriveBtn" onclick="selectGoogleDrive()">
                    <div class="btn-icon purple">
                        <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M7.71,3.5L1.15,15L4.58,21L11.13,9.5M9.73,15L6.3,21H19.42L22.85,15M22.28,14L15.42,2H8.58L8.57,2L15.43,13.5"/>
                        </svg>
                    </div>
                    <div class="btn-info">
                        <div class="btn-title">Upload from Google Drive</div>
                        <div class="btn-desc">Access and search photos from your Google Drive</div>
                    </div>
                </button>
            </div>
        </div>

        <div class="search-section" id="searchSection">
            <div class="search-container">
                <div class="search-box">
                    <div class="search-input-wrapper">
                        <svg class="search-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
                        </svg>
                        <input type="text" id="searchInput" class="search-input" 
                               placeholder="Try: 'dog', 'sunset', 'people smiling', 'beach'"
                               onkeypress="if(event.key==='Enter') performSearch()">
                        <button class="search-btn" id="searchBtn" onclick="performSearch()">Search</button>
                    </div>
                    
                    <button class="change-folder-btn" id="changeFolderBtn" onclick="selectFolder()">
                        <svg width="18" height="18" fill="currentColor" viewBox="0 0 20 20">
                            <path d="M2 6a2 2 0 012-2h5l2 2h5a2 2 0 012 2v6a2 2 0 01-2 2H4a2 2 0 01-2-2V6z"/>
                        </svg>
                        <span>Change Folder</span>
                    </button>
                </div>
            </div>
            <div class="results-grid" id="resultsGrid"></div>
        </div>
    </main>

    <div id="imageViewer">
        <div class="viewer-toolbar">
            <button onclick="zoomOut()">
                <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0zM13 10H7"/>
                </svg>
                Zoom Out
            </button>
            <button onclick="zoomIn()">
                <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0zM10 7v3m0 0v3m0-3h3m-3 0H7"/>
                </svg>
                Zoom In
            </button>
            <button onclick="downloadImage()">
                <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/>
                </svg>
                Download
            </button>
            <button onclick="shareImage()">
                <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z"/>
                </svg>
                Share
            </button>
            <button onclick="closeViewer()">
                <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                </svg>
                Close
            </button>
        </div>
        <div style="display:flex;justify-content:center;align-items:center;height:90%;">
            <img id="viewerImg">
        </div>
    </div>

    <script>
        // Backend URL
        const API_URL = (window.electronAPI?.isElectron || window.location.hostname === 'localhost') ? 'http://localhost:5500' : window.location.origin;
        
        // ==================== PERFORMANCE OPTIMIZATION ====================
        const BATCH_SIZE = 100;
        const USE_CACHE = true;
        const CACHE_VERSION = 1;
        const PROGRESSIVE_SEARCH = true;
        
        const MIN_SCORE = 0.25;
        const REL_THRESHOLD = 0.75;
        const MAX_RES = 30;

        let models = { imgSession: null, txtSession: null, tokenizer: null, embeddings: {} };

        // ── Python fast-indexing backend ──────────────────────────────────────
        // When available, all indexing/search/duplicates go through the Python
        // Flask server (PyTorch + OpenCLIP) — same engine as the fast Python app.
        let _pyPort      = 5501;
        let _pyAvailable = false;   // set true once /health confirms it's up
        let _currentFolder = null;  // track which folder is indexed in Python

        async function initPythonBackend() {
            if (!window.electronAPI?.pythonGetPort) return;
            try {
                _pyPort = await window.electronAPI.pythonGetPort();
                // Poll until the Python server responds (it starts in background)
                for (let i = 0; i < 60; i++) {
                    try {
                        const r = await fetch(`http://127.0.0.1:${_pyPort}/health`);
                        if (r.ok) {
                            const j = await r.json();
                            _pyAvailable = true;
                            console.log('[PyBackend] Online ✓ model_loaded:', j.model_loaded);
                            return;
                        }
                    } catch(e) {}
                    await new Promise(r => setTimeout(r, 500));
                }
                console.warn('[PyBackend] Timed out — will use JS fallback');
            } catch(e) {
                console.warn('[PyBackend] Not available:', e.message);
            }
        }
        let processedCount = 0;
        let indexingCancelled = false; // set true to abort current indexing
        let totalToProcess = 0;
        let startTime = 0;

        // spell check for common typos
        const TYPOS = {
            'dogg': 'dog', 
            'doggy': 'dog',
            'dgo': 'dog',
            'catt': 'cat', 
            'caat': 'cat',
            'kat': 'cat',
            'carr': 'car',
            'caar': 'car',
            'treee': 'tree',
            'tre': 'tree',
            'buildin': 'building',
            'buiding': 'building',
            'flwr': 'flower',
            'flowr': 'flower',
            'mountian': 'mountain', 'montain': 'mountain',
            'beech': 'beach',
            'bech': 'beach',
            'wter': 'water',
            'watr': 'water',
            'persn': 'person',
            'persen': 'person',
            'yelow': 'yellow',
            'yellw': 'yellow',
            'oragne': 'orange', 'ornge': 'orange',
            'grean': 'green', 'gren': 'green',
            'blu': 'blue',
            'bleu': 'blue',
            'blak': 'black',
            'balck': 'black',
            'whte': 'white', 'wite': 'white',
            'shrt': 'shirt',
            'shiirt': 'shirt',
            'shirrt': 'shirt',
            'shirtt': 'shirt',
            'dres': 'dress', 'dreess': 'dress',
            'sho': 'shoe', 'shoo': 'shoe',
            'hous': 'house', 'houze': 'house',
            'fod': 'food', 'foood': 'food',
            'cak': 'cake',
            'caek': 'cake',
            'piza': 'pizza',
            'pizzza': 'pizza'
        };
        
        function fixTypos(query) {
            const words = query.toLowerCase().trim().split(/\s+/);
            let changed = false;
            
            // old approach - keeping for reference
            // const fixed = words.map(w => TYPOS[w] || w);
            
            const fixed = words.map(word => {
                if(TYPOS[word]) {
                    console.log('fixed:', word, '->', TYPOS[word]);
                    changed = true;
                    return TYPOS[word];
                }
                return word;
            });
            
            const result = fixed.join(' ');
            if(changed) {
                console.log('corrected query:', query, '->', result);
            }
            return result;
        }

        // google drive integration
        
        async function selectGoogleDrive() {
            try {
                document.getElementById('statusText').textContent = 'Connecting to Google Drive...';
                
                // Get auth URL from backend
                const response = await fetch(`${API_URL}/auth/google`);
                const { authUrl } = await response.json();
                
                // Open OAuth window (works in both browser and Electron)
                const authWindow = window.open(authUrl, 'Google Drive Auth', 'width=520,height=680,menubar=no,toolbar=no');
                
                // Poll auth status until complete or timed out
                let pollCount = 0;
                const MAX_POLLS = 300; // 5 minutes at 1s intervals
                const checkAuth = setInterval(async () => {
                    pollCount++;
                    try {
                        const checkResponse = await fetch(`${API_URL}/auth/check`);
                        const { authenticated } = await checkResponse.json();
                        
                        if (authenticated) {
                            clearInterval(checkAuth);
                            try { if (authWindow && !authWindow.closed) authWindow.close(); } catch(e) {}
                            await showDriveFolderPicker();
                            return;
                        }
                    } catch (error) {
                        console.error('Auth check error:', error);
                    }
                    // Stop polling if window was closed manually or timeout reached
                    if (pollCount >= MAX_POLLS || (authWindow && authWindow.closed)) {
                        clearInterval(checkAuth);
                        document.getElementById('statusText').textContent = 'Authentication cancelled.';
                    }
                }, 1000);
                
            } catch (error) {
                console.error('Google Drive error:', error);
                alert('Failed to connect to Google Drive: ' + error.message);
                document.getElementById('statusText').textContent = 'Failed to connect to Google Drive';
            }
        }
        
        // ── Google Drive Folder Picker ────────────────────────────────────────
        let driveFolderStack = [{ id: 'root', name: 'My Drive' }];

        async function showDriveFolderPicker() {
            const modal = document.createElement('div');
            modal.id = 'driveFolderModal';
            modal.style.cssText = `position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:99998;display:flex;align-items:center;justify-content:center`;
            modal.innerHTML = `
                <div style="background:#1e2030;border:1px solid #334155;border-radius:16px;width:480px;max-height:560px;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 24px 64px rgba(0,0,0,0.6)">
                    <div style="padding:20px 24px;border-bottom:1px solid #334155;display:flex;align-items:center;justify-content:space-between">
                        <div>
                            <div style="font-size:16px;font-weight:700;color:#f1f5f9">Choose Google Drive Folder</div>
                            <div id="driveBreadcrumb" style="font-size:12px;color:#64748b;margin-top:4px">My Drive</div>
                        </div>
                        <button onclick="document.getElementById('driveFolderModal').remove()" style="background:none;border:none;color:#64748b;font-size:22px;cursor:pointer;padding:4px 8px;border-radius:6px">×</button>
                    </div>
                    <div id="driveFolderList" style="flex:1;overflow-y:auto;padding:12px">
                        <div style="color:#64748b;text-align:center;padding:32px">Loading folders...</div>
                    </div>
                    <div style="padding:16px 24px;border-top:1px solid #334155;display:flex;gap:10px;justify-content:flex-end">
                        <button onclick="document.getElementById('driveFolderModal').remove()" style="background:#334155;border:none;border-radius:8px;color:#e2e8f0;padding:10px 20px;cursor:pointer;font-size:13px">Cancel</button>
                        <button id="driveSelectFolderBtn" onclick="confirmDriveFolderSelection()" style="background:linear-gradient(135deg,#3b82f6,#6366f1);border:none;border-radius:8px;color:#fff;padding:10px 20px;cursor:pointer;font-size:13px;font-weight:600">Index This Folder</button>

                    </div>

        async function loadDriveFolders(parentId) {

            if (!list) return;

                    row.onmouseenter = () => row.style.background = '#334155';

        function confirmDriveFolderSelection() {
            const current = driveFolderStack[driveFolderStack.length - 1];
            document.getElementById('driveFolderModal')?.remove();
